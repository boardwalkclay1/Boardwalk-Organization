<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Boardwalk Clay — Admin Console</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            margin: 0;
            background: #0b0b10;
            color: #f5f5f5;
            font-family: system-ui, sans-serif;
            display: flex;
            height: 100vh;
        }

        .admin-sidebar {
            width: 240px;
            background: #111118;
            border-right: 1px solid #1d1d27;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
        }

        .sidebar-btn {
            padding: 14px 20px;
            cursor: pointer;
            color: #cfcfe8;
            border-bottom: 1px solid #1d1d27;
            transition: 0.2s;
        }

        .sidebar-btn:hover,
        .sidebar-btn.active {
            background: #1a1a25;
            color: #fff;
        }

        .admin-panel {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
        }

        .panel-view {
            display: none;
        }

        .panel-view:not(.hidden) {
            display: block;
        }

        h2 {
            margin-top: 0;
            font-weight: 600;
        }

        .input {
            background: #151520;
            border: 1px solid #2a2a38;
            padding: 10px;
            border-radius: 6px;
            width: 100%;
            color: #fff;
            margin-bottom: 12px;
        }

        .btn {
            background: #3b3bf0;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            color: #fff;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn:hover {
            background: #2a2ac0;
        }
    </style>
</head>

<body>

    <!-- SIDEBAR -->
    <div class="admin-sidebar">
        <div class="sidebar-btn" data-panel="dashboard">Dashboard</div>
        <div class="sidebar-btn" data-panel="events">Events</div>
        <div class="sidebar-btn" data-panel="tasks">Tasks</div>
        <div class="sidebar-btn" data-panel="donations">Donations</div>
        <div class="sidebar-btn" data-panel="sponsors">Sponsors</div>
        <div class="sidebar-btn" data-panel="settings">Settings</div>
    </div>

    <!-- MAIN PANEL -->
    <div class="admin-panel">

        <!-- DASHBOARD -->
        <div id="panel-dashboard" class="panel-view">
            <h2>Admin Dashboard</h2>
            <p>Welcome to the Boardwalk Clay Admin Console.</p>
        </div>

        <!-- EVENTS -->
        <div id="panel-events" class="panel-view hidden">
            <h2>Create Event</h2>
            <input class="input" id="event-title" placeholder="Event Title">
            <input class="input" id="event-date" placeholder="Event Date">
            <button class="btn" onclick="AdminApp.createEvent()">Save Event</button>
        </div>

        <!-- TASKS -->
        <div id="panel-tasks" class="panel-view hidden">
            <h2>Create Task</h2>
            <input class="input" id="task-title" placeholder="Task Title">
            <input class="input" id="task-desc" placeholder="Task Description">
            <button class="btn" onclick="AdminApp.createTask()">Save Task</button>
        </div>

        <!-- DONATIONS -->
        <div id="panel-donations" class="panel-view hidden">
            <h2>Donations</h2>
            <p>Donation logs will appear here (JSON DB).</p>
        </div>

        <!-- SPONSORS -->
        <div id="panel-sponsors" class="panel-view hidden">
            <h2>Add Sponsor</h2>
            <input class="input" id="sponsor-name" placeholder="Sponsor Name">
            <input class="input" id="sponsor-email" placeholder="Sponsor Email">
            <button class="btn" onclick="AdminApp.addSponsor()">Save Sponsor</button>
        </div>

        <!-- SETTINGS -->
        <div id="panel-settings" class="panel-view hidden">
            <h2>System Settings</h2>
            <p>Future settings will go here.</p>
        </div>

    </div>

    <script src="admin.js"></script>
</body>
</html>
